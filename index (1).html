    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-card">

                    <option value="6">Grade 6</option>
                    <option value="5">Grade 5</option>
                    <option value="4">Grade 4</option>
                    <option value="3">Grade 3</option>
                    <option value="2">Grade 2</option>
                    <option value="1">Grade 1</option>
                </select>
            </div>
            
            <button class="btn-start" onclick="startApp()">Start Studying 🚀</button>

    </div>
    
    <div class="app-container" id="appContainer">
        <div class="header">

            <div class="target-info" id="targetInfo"></div>
        </div>
        
        <div class="dashboard">

                        <option value="Hazards">Hazards</option>

        const questionsData = [{"id": "2019_1R_2_a", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "a", "command_word": "MCQ", "marks": 1, "topic": "Wave processes", "question_summary": "Identify characteristic of constructive waves", "resource": "None", "content_required": "Long wavelength / weak backwash", "mark_scheme": "**Accept:** Correct: A", "ao_mapping": "AO1", "category": "Coasts", "mark_scheme_display": "**Accept:** Correct: A"}, {"id": "2019_1R_2_b(i)", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "b(i)", "command_word": "MCQ", "marks": 1, "topic": "Coastal landforms", "question_summary": "Identify depositional landform", "resource": "None", "content_required": "", "mark_scheme": "**Accept:** Correct: B (spit)", "ao_mapping": "AO1", "category": "Coasts", "mark_scheme_display": "**Accept:** Correct: B (spit)"}, {"id": "2019_1R_2_b(ii)", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "b(ii)", "command_word": "State", "marks": 1, "topic": "Weathering", "question_summary": "State one type of weathering affecting coasts", "resource": "None", "content_required": "", "mark_scheme": "**Accept:** Biological, Chemical, Physical", "ao_mapping": "AO1", "category": "Coasts", "mark_scheme_display": "**Accept:** Biological, Chemical, Physical"}, {"id": "2019_1R_2_b(iii)", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "b(iii)", "command_word": "Explain", "marks": 2, "topic": "Longshore drift", "question_summary": "Explain the process of longshore drift", "resource": "None", "content_required": "", "mark_scheme": "**Process of longshore drift:**\n\nTransportation along coast (1) zig-zag pattern (1)\n\n**How to get 2/2:** Explain the process with TWO clear development points showing cause and effect", "ao_mapping": "AO1/AO2", "category": "Coasts", "mark_scheme_display": "**Process of longshore drift:**\n\nTransportation along coast (1) zig-zag pattern (1)\n\n**How to get 2/2:** Explain the process with TWO clear development points showing cause and effect"}, {"id": "2019_1R_2_c", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "c", "command_word": "Suggest", "marks": 4, "topic": "Geology & coastline shape", "question_summary": "Suggest two ways geology influences coastline shape", "resource": "Fig 2a – headland/bay diagram", "content_required": "", "mark_scheme": "**How geology influences coastline shape:**\n\n• **Hard rock (e.g. granite, limestone):** Resists erosion (1), erodes slowly forming headlands (1)\n\n• **Soft rock (e.g. clay, sand):** Erodes quickly (1), forms bays between headlands (1)\n\n• **Rock structure/joints:** Weaknesses in rock erode faster (1), creating caves/arches/stacks (1)\n\n• **Dip of rock layers:** Horizontal layers = steep cliffs (1), angled layers = sloping cliffs (1)\n\n**How to get 4/4:** Two factors with TWO marks each (identify + explain), OR one factor with four development points", "ao_mapping": "AO2/AO3", "category": "Coasts", "mark_scheme_display": "**How geology influences coastline shape:**\n\n• **Hard rock (e.g. granite, limestone):** Resists erosion (1), erodes slowly forming headlands (1)\n\n• **Soft rock (e.g. clay, sand):** Erodes quickly (1), forms bays between headlands (1)\n\n• **Rock structure/joints:** Weaknesses in rock erode faster (1), creating caves/arches/stacks (1)\n\n• **Dip of rock layers:** Horizontal layers = steep cliffs (1), angled layers = sloping cliffs (1)\n\n**How to get 4/4:** Two factors with TWO marks each (identify + explain), OR one factor with four development points"}, {"id": "2019_1R_2_d", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "d", "command_word": "Explain", "marks": 3, "topic": "Coral reef distribution", "question_summary": "Explain one physical factor influencing coral reef distribution", "resource": "None", "content_required": "", "mark_scheme": "**Physical factors affecting coral reef distribution (choose ONE):**\n\n• **Temperature:** Requires minimum 18°C water temperature (1), optimum 23-29°C (1), too cold = coral cannot survive (1)\n\n• **Light:** Needs shallow, clear water for light penetration (1), for photosynthesis by zooxanthellae algae (1), maximum depth ~30m (1)\n\n• **Salinity:** Requires normal ocean salinity 32-42 ppt (1), freshwater from rivers kills coral (1), found away from river mouths (1)\n\n• **Wave action:** Needs some wave action for oxygen/nutrients (1), but not too strong or coral breaks (1), found in sheltered lagoons (1)\n\n**How to get 3/3:** State factor (1) + Explain requirement (1) + Consequence/detail (1)", "ao_mapping": "AO2", "category": "Coasts", "mark_scheme_display": "**Physical factors affecting coral reef distribution (choose ONE):**\n\n• **Temperature:** Requires minimum 18°C water temperature (1), optimum 23-29°C (1), too cold = coral cannot survive (1)\n\n• **Light:** Needs shallow, clear water for light penetration (1), for photosynthesis by zooxanthellae algae (1), maximum depth ~30m (1)\n\n• **Salinity:** Requires normal ocean salinity 32-42 ppt (1), freshwater from rivers kills coral (1), found away from river mouths (1)\n\n• **Wave action:** Needs some wave action for oxygen/nutrients (1), but not too strong or coral breaks (1), found in sheltered lagoons (1)\n\n**How to get 3/3:** State factor (1) + Explain requirement (1) + Consequence/detail (1)"}, {"id": "2019_1R_2_e", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "e", "command_word": "Identify", "marks": 1, "topic": "Coastal landforms", "question_summary": "Identify coastal landform X from photograph", "resource": "Fig 2b – Cliffs of Moher, Ireland photo", "content_required": "Stack", "mark_scheme": "**Accept:** Stack", "ao_mapping": "AO3", "category": "Coasts", "mark_scheme_display": "**Accept:** Stack"}, {"id": "2019_1R_2_f", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "f", "command_word": "Explain", "marks": 4, "topic": "Cliff formation", "question_summary": "Explain how a cliff is formed", "resource": "None", "content_required": "", "mark_scheme": "**How a cliff is formed:**\n\n1. **Wave attack:** Destructive waves attack base of slope (1), using hydraulic action and abrasion (1)\n\n2. **Notch formation:** Wave-cut notch forms at base (1), cliff becomes undercut/unstable (1)\n\n3. **Collapse:** Overhanging rock collapses due to gravity (1), debris removed by waves (1)\n\n4. **Repetition:** Process repeats (1), cliff retreats inland leaving wave-cut platform (1)\n\n**How to get 4/4:** Four clear stages of the process", "ao_mapping": "AO2", "category": "Coasts", "mark_scheme_display": "**How a cliff is formed:**\n\n1. **Wave attack:** Destructive waves attack base of slope (1), using hydraulic action and abrasion (1)\n\n2. **Notch formation:** Wave-cut notch forms at base (1), cliff becomes undercut/unstable (1)\n\n3. **Collapse:** Overhanging rock collapses due to gravity (1), debris removed by waves (1)\n\n4. **Repetition:** Process repeats (1), cliff retreats inland leaving wave-cut platform (1)\n\n**How to get 4/4:** Four clear stages of the process"}, {"id": "2019_1R_2_g", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "g", "command_word": "Analyse", "marks": 8, "topic": "Hard engineering", "question_summary": "Analyse reasons for different hard engineering strategies", "resource": "Figs 2c/2d – coastal management diagram + photos (rock armour, groynes, sea wall, breakwater with costs)", "content_required": "", "mark_scheme": "L3 (7-8): Walls at high-value settlements; groynes at beach areas to stop longshore drift\n\n**Level 3 (7-8 marks):** Detailed analysis with multiple well-developed points, specific examples/case studies, clear links between ideas\n\n**Level 2 (4-6 marks):** Clear explana : "AO2/AO3", "category": "Hazards", "mark_scheme_display": "27°C+ water fuels evap (1); Coriolis force (1) not at equator\n\n**How to get 4/4:** Usually TWO factors/impacts explained (2+2) OR sequential process with 4 stages"}, {"id": "2024_1R_3_g", "paper": "1R", "year": "2024", "section": "Hazardous Environments", "q_no": "3", "sub_q": "g", "command_word": "Analyse", "marks": 8, "topic": "Cyclone impacts", "question_summary": "Analyse the impacts of tropical cyclones on people", "resource": "Fig 3c: Hurricane Irma – 40% businesses closed; 73% power cuts; 25% homes destroyed", "content_required": "", "mark_scheme": "L3 (7-8): Evaluate immediate housing trauma vs long-term economic instability (business closures)\n\n**Level 3 (7-8 marks):** Detailed analysis with multiple well-developed points, specific examples/case studies, clear links between ideas\n\n**Level 2 (4-6 marks):** Clear explanation with some development, some examples\n\n**Level 1 (1-3 marks):** Simple statements, limited detail\n\n**SPaG:** Up to 4 additional marks for spelling, punctuation, grammar", "ao_mapping": "AO3/AO4", "category": "Hazards", "mark_scheme_display": "L3 (7-8): Evaluate immediate housing trauma vs long-term economic instability (business closures)\n\n**Level 3 (7-8 marks):** Detailed analysis with multiple well-developed points, specific examples/case studies, clear links between ideas\n\n**Level 2 (4-6 marks):** Clear explanation with some development, some examples\n\n**Level 1 (1-3 marks):** Simple statements, limited detail\n\n**SPaG:** Up to 4 additional marks for spelling, punctuation, grammar"}];
        
        let studentData = { name: '', yearGroup: '', teacher: '', targetGrade: '', attempts: {} };
        let currentQuestionIndex = 0;
        let filteredQuestions = [];
        
        function updateGradeLabel() {
            const yearGroup = document.getElementById('yearGroup').value;
            const gradeLabel = document.getElementById('gradeLabel');
            const teacherGroup = document.getElementById('teacherGroup');
            const gradeGroup = document.getElementById('gradeGroup');
            
            if (yearGroup) {
                teacherGroup.style.display = 'block';
                if (yearGroup === 'Year 10') {
                    gradeLabel.textContent = 'Current Grade';
                } else if (yearGroup === 'Year 11') {
                    gradeLabel.textContent = 'Mock Grade';
                }
                gradeGroup.style.display = 'block';
            } else {
                teacherGroup.style.display = 'none';
                gradeGroup.style.display = 'none';
            }
        }
        
        function init() {
            loadStudentData();
            if (studentData.name && studentData.targetGrade) {
                showApp();
            } else {
                document.getElementById('welcomeScreen').style.display = 'flex';
            }
        }
        
        function startApp() {
            const name = document.getElementById('studentName').value.trim();
            const year = document.getElementById('yearGroup').value;
            const teacher = document.getElementById('teacherName').value;
            const grade = document.getElementById('targetGrade').value;
            
            if (!name || !year || !teacher || !grade) {
                alert('Please fill in all fields!');
                return;
            }
            
            studentData.name = name;
            studentData.yearGroup = year;
            studentData.teacher = teacher;
            studentData.targetGrade = grade;
            saveStudentData();
            showApp();
        }
        
        function showApp() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('appContainer').classList.add('active');
            updateGreeting();
            populateFilters();
            applyFilters();
            renderCurrentQuestion();
            updateDashboard();
        }
        
        function updateGreeting() {
            const gradeType = studentData.yearGroup === 'Year 10' ? 'Current Grade' : 'Mock Grade';
            document.getElementById('greeting').textContent = `Welcome back, ${studentData.name}! 👋`;
            document.getElementById('targetInfo').textContent = `${studentData.yearGroup} • ${studentData.teacher} • ${gradeType}: ${studentData.targetGrade}`;
        }
        
        function changeStudent() {
            if (confirm('Change student? Your progress will be saved.')) {
                document.getElementById('welcomeScreen').style.display = 'flex';
                document.getElementById('appContainer').classList.remove('active');
                document.getElementById('studentName').value = '';
                document.getElementById('yearGroup').value = '';
                document.getElementById('teacherName').value = '';
                document.getElementById('targetGrade').value = '';
            }
        }
        
        function loadStudentData() {
            const saved = localStorage.getItem('coastalStudentData');
            if (saved) studentData = JSON.parse(saved);
        }
        
        function saveStudentData() {
            localStorage.setItem('coastalStudentData', JSON.stringify(studentData));
        }
        
        function populateFilters() {
            const years = [...new Set(questionsData.map(q => q.year))].sort().reverse();
            const yearFilter = document.getElementById('yearFilter');
            years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearFilter.appendChild(option);
            });
        }
        
        function applyFilters() {
            const category = document.getElementById('categoryFilter').value;
            const year = document.getElementById('yearFilter').value;
            const marks = document.getElementById('marksFilter').value;
            const rag = document.getElementById('ragFilter').value;
            
            filteredQuestions = questionsData.filter(q => {
                const matchCategory = !category || q.category === category;
                const matchYear = !year || q.year === year;
                let matchMarks = true;
                if (marks) {
                    if (marks === '5+') matchMarks = q.marks >= 5;
                    else matchMarks = q.marks === parseInt(marks);
                }
                let matchRag = true;
                if (rag) {
                    const attempt = studentData.attempts[q.id];
                    if (rag === 'unattempted') matchRag = !attempt;
                    else if (attempt) matchRag = attempt.rag === rag;
                    else matchRag = false;
                }
                return matchCategory && matchYear && matchMarks && matchRag;
            });
            currentQuestionIndex = 0;
            renderCurrentQuestion();
        }
        
        function renderMarkScheme(q) {
            return `<div class="mark-scheme-content"><h4>✅ Mark Scheme (${q.marks} mark${q.marks > 1 ? 's' : ''})</h4><div style="background: white; color: #1e293b; padding: 15px; border-radius: 8px; margin-top: 12px;"><strong>Mark allocation:</strong><br>${q.mark_scheme}</div></div>`;
        }
        
        function renderCurrentQuestion() {
            if (filteredQuestions.length === 0) {
                document.getElementById('questionViewer').innerHTML = '<div style="padding: 60px; text-align: center; color: #94a3b8;"><h3>No questions found</h3><p>Try adjusting your filters</p></div>';
                return;
            }
            
            const q = filteredQuestions[currentQuestionIndex];
            const attempt = studentData.attempts[q.id];
            const fullQNumber = q.sub_q ? `${q.q_no}(${q.sub_q})` : q.q_no;
            let cardClass = 'question-card';
            if (attempt) cardClass += ` completed-${attempt.rag}`;
            
            document.getElementById('questionCounter').textContent = `Question ${currentQuestionIndex + 1} of ${filteredQuestions.length}`;
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            document.getElementById('nextBtn').disabled = currentQuestionIndex === filteredQuestions.length - 1;
            
            document.getElementById('questionViewer').innerHTML = `
                <div class="${cardClass}">
                    <div class="question-header">
                        <div class="question-meta">
                            <span class="badge badge-category">${q.category}</span>
                            <span class="badge badge-year">${q.year}</span>
                            <span class="badge badge-paper">Paper ${q.paper}</span>
                            <span class="badge badge-marks">${q.marks} mark${q.marks > 1 ? 's' : ''}</span>
                            <span class="badge badge-command">${q.command_word}</span>
                        </div>
                        <div class="question-number">Q${fullQNumber}</div>
                    </div>
                    <div class="question-text">${q.question_summary}</div>
                    ${q.resource !== 'None' && q.resource ? `<div class="resource-note">📊 Resource: ${q.resource}</div>` : ''}
                    ${q.content_required && q.content_required !== 'None' ? `<div class="content-required"><h5>🎯 Key Content Required:</h5>${q.content_required}</div>` : ''}
                    <button class="mark-scheme-toggle" onclick="toggleMarkScheme()">Show Mark Scheme</button>
                    <div class="mark-scheme" id="currentMarkScheme">${renderMarkScheme(q)}</div>
                    ${attempt ? `<div class="score-result ${attempt.rag}">Your Score: ${attempt.score}/${attempt.maxMarks} (${attempt.percentage}%) - ${attempt.rag === 'green' ? '🟢 GREEN - Excellent!' : attempt.rag === 'amber' ? '🟠 AMBER - Review key points' : '🔴 RED - Retry after reviewing'}</div>` : `<div class="score-entry"><h4>📝 Record Your Score</h4><div class="score-input-group"><div class="score-input-wrapper"><label>Your Score (out of ${q.marks})</label><input type="number" id="currentScore" min="0" max="${q.marks}" placeholder="0"></div><button class="btn-submit-score" onclick="submitCurrentScore()">Submit</button></div></div>`}
                </div>
            `;
        }
        
        function toggleMarkScheme() {
            const ms = document.getElementById('currentMarkScheme');
            const btn = ms.previousElementSibling;
            if (ms.classList.contains('visible')) {
                ms.classList.remove('visible');
                btn.textContent = 'Show Mark Scheme';
            } else {
                ms.classList.add('visible');
                btn.textContent = 'Hide Mark Scheme';
            }
        }
        
        function previousQuestion() { if (currentQuestionIndex > 0) { currentQuestionIndex--; renderCurrentQuestion(); } }
        function nextQuestion() { if (currentQuestionIndex < filteredQuestions.length - 1) { currentQuestionIndex++; renderCurrentQuestion(); } }
        
        function submitCurrentScore() {
            const q = filteredQuestions[currentQuestionIndex];
            const score = parseInt(document.getElementById('currentScore').value);
            if (isNaN(score) || score < 0 || score > q.marks) { alert(`Please enter a score between 0 and ${q.marks}`); return; }
            const percentage = Math.round((score / q.marks) * 100);
            let rag = percentage >= 80 ? 'green' : percentage >= 50 ? 'amber' : 'red';
            studentData.attempts[q.id] = { score, maxMarks: q.marks, percentage, rag, timestamp: new Date().toISOString() };
            saveStudentData();
            sendToGoogleSheets({ studentName: studentData.name, yearGroup: studentData.yearGroup, teacher: studentData.teacher, targetGrade: studentData.targetGrade, year: q.year, paper: q.paper, question: `Q${q.q_no}${q.sub_q ? '(' + q.sub_q + ')' : ''}`, maxMarks: q.marks, score, percentage, rag: rag.toUpperCase() });
            renderCurrentQuestion();
            updateDashboard();
        }
        
        function sendToGoogleSheets(data) { fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }).catch(err => console.log('Data sent')); }
        
        function updateDashboard() {
            const attempts = Object.values(studentData.attempts);
            const completed = attempts.length;
            const progress = Math.round((completed / questionsData.length) * 100);
            let greenCount = 0, amberCount = 0, redCount = 0, totalPercentage = 0;
            attempts.forEach(att => {
                if (att.rag === 'green') greenCount++;
                else if (att.rag === 'amber') amberCount++;
                else if (att.rag === 'red') redCount++;
                totalPercentage += att.percentage;
            });
            const avgScore = completed > 0 ? Math.round(totalPercentage / completed) + '%' : '-';
            document.getElementById('questionsCompleted').textContent = completed;
            document.getElementById('totalProgress').textContent = progress + '%';
            document.getElementById('averageScore').textContent = avgScore;
            document.getElementById('greenCount').textContent = greenCount;
            document.getElementById('amberCount').textContent = amberCount;
            document.getElementById('redCount').textContent = redCount;
        }
        
        function resetFilters() {
            document.getElementById('categoryFilter').value = '';
            document.getElementById('yearFilter').value = '';
            document.getElementById('marksFilter').value = '';
            document.getElementById('ragFilter').value = '';
            applyFilters();
        }
        
        function randomQuestion() {
            const unattempted = questionsData.filter(q => !studentData.attempts[q.id]);
            const pool = unattempted.length > 0 ? unattempted : questionsData;
            const random = pool[Math.floor(Math.random() * pool.length)];
            resetFilters();
            filteredQuestions = questionsData;
            currentQuestionIndex = questionsData.findIndex(q => q.id === random.id);
            renderCurrentQuestion();
        }
        
        document.getElementById('categoryFilter').addEventListener('change', applyFilters);
        document.getElementById('yearFilter').addEventListener('change', applyFilters);
        document.getElementById('marksFilter').addEventListener('change', applyFilters);
        document.getElementById('ragFilter').addEventListener('change', applyFilters);
        
        init();
    </script>
