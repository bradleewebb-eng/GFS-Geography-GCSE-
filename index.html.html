<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper 1 Question Bank - IGCSE Geography</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        /* Welcome Screen */
        .welcome-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        
        .welcome-card {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 60px 50px;
            border-radius: 24px;
            max-width: 550px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .welcome-card h1 {
            font-size: 2.75em;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            font-weight: 800;
            text-align: center;
        }
        
        .welcome-card .subtitle {
            font-size: 1.3em;
            color: #94a3b8;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 500;
        }
        
        .input-group {
            margin-bottom: 28px;
        }
        
        .input-group label {
            display: block;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 10px;
            font-size: 1em;
        }
        
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.05em;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            color: #e2e8f0;
            transition: all 0.3s;
        }
        
        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        
        .btn-start {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2em;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            transition: all 0.3s;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3);
        }
        
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.4);
        }
        
        /* Main App */
        .app-container {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .app-container.active {
            display: block;
        }
        
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-radius: 20px;
            padding: 40px 45px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
        }
        
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            font-weight: 800;
        }
        
        .personalized-greeting {
            font-size: 1.4em;
            color: #cbd5e1;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .target-info {
            font-size: 1.05em;
            color: #94a3b8;
        }
        
        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 28px 25px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.2);
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.2);
        }
        
        .stat-value {
            font-size: 2.8em;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1;
        }
        
        .stat-value.green { color: #10b981; }
        .stat-value.amber { color: #f59e0b; }
        .stat-value.red { color: #ef4444; }
        .stat-value.blue { 
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            font-size: 0.9em;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Controls */
        .controls {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 35px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.2);
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            margin-bottom: 25px;
        }
        
        .filter-group label {
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
            display: block;
            font-size: 0.9em;
        }
        
        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 0.95em;
            transition: all 0.3s;
        }
        
        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.8);
        }
        
        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }
        
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
            border: 1px solid transparent;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 4px 15px -3px rgba(59, 130, 246, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -5px rgba(59, 130, 246, 0.4);
        }
        
        .btn-secondary {
            background: rgba(71, 85, 105, 0.5);
            color: #cbd5e1;
            border-color: rgba(148, 163, 184, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(71, 85, 105, 0.8);
            border-color: rgba(148, 163, 184, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px -3px rgba(16, 185, 129, 0.3);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
        }
        
        /* Questions */
        .questions-container {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.2);
        }
        
        .question-card {
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(148, 163, 184, 0.15);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 25px;
            transition: all 0.3s;
        }
        
        .question-card:hover {
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 8px 25px -5px rgba(59, 130, 246, 0.15);
            transform: translateY(-2px);
        }
        
        .question-card.completed-green {
            border-left: 6px solid #10b981;
            background: linear-gradient(to right, rgba(16, 185, 129, 0.1) 0%, rgba(15, 23, 42, 0.6) 100%);
        }
        
        .question-card.completed-amber {
            border-left: 6px solid #f59e0b;
            background: linear-gradient(to right, rgba(245, 158, 11, 0.1) 0%, rgba(15, 23, 42, 0.6) 100%);
        }
        
        .question-card.completed-red {
            border-left: 6px solid #ef4444;
            background: linear-gradient(to right, rgba(239, 68, 68, 0.1) 0%, rgba(15, 23, 42, 0.6) 100%);
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 22px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .question-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .badge {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .badge-year { background: #3b82f6; color: white; }
        .badge-paper { background: #2563eb; color: white; }
        .badge-marks { background: #f59e0b; color: white; }
        .badge-command { background: #06b6d4; color: white; }
        .badge-topic { background: #64748b; color: white; }
        
        .question-number {
            font-size: 1.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .question-text {
            font-size: 1.15em;
            line-height: 1.8;
            margin: 18px 0;
            color: #cbd5e1;
        }
        
        .resource-note {
            background: rgba(245, 158, 11, 0.15);
            border-left: 4px solid #f59e0b;
            padding: 14px;
            margin: 14px 0;
            font-size: 0.95em;
            color: #fbbf24;
            border-radius: 8px;
        }
        
        .content-required {
            background: rgba(6, 182, 212, 0.15);
            padding: 16px;
            border-radius: 10px;
            margin: 14px 0;
            border-left: 4px solid #06b6d4;
        }
        
        .content-required h5 {
            color: #22d3ee;
            margin-bottom: 10px;
            font-size: 1em;
            font-weight: 700;
        }
        
        .content-required {
            color: #cbd5e1;
        }
        
        /* Mark Scheme */
        .mark-scheme-toggle {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 13px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95em;
            margin-top: 14px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px -3px rgba(59, 130, 246, 0.3);
        }
        
        .mark-scheme-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px -3px rgba(59, 130, 246, 0.4);
        }
        
        .mark-scheme {
            display: none;
            margin-top: 18px;
            padding: 22px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 12px;
            border-left: 5px solid #10b981;
        }
        
        .mark-scheme.visible {
            display: block;
        }
        
        .mark-scheme h4 {
            color: #34d399;
            margin-bottom: 14px;
            font-size: 1.1em;
        }
        
        .mark-scheme {
            color: #cbd5e1;
        }
        
        /* Score Entry */
        .score-entry {
            margin-top: 22px;
            padding: 24px;
            background: rgba(59, 130, 246, 0.08);
            border-radius: 12px;
            border: 2px dashed rgba(59, 130, 246, 0.3);
        }
        
        .score-entry h4 {
            color: #60a5fa;
            margin-bottom: 16px;
            font-weight: 700;
        }
        
        .score-input-group {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        
        .score-input-wrapper {
            flex: 1;
            min-width: 150px;
        }
        
        .score-input-wrapper label {
            display: block;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        
        .score-input-wrapper input {
            width: 100%;
            padding: 14px;
            font-size: 1.2em;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 10px;
            text-align: center;
            font-weight: 700;
            color: #e2e8f0;
        }
        
        .score-input-wrapper input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .btn-submit-score {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            box-shadow: 0 4px 12px -3px rgba(16, 185, 129, 0.3);
        }
        
        .btn-submit-score:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px -3px rgba(16, 185, 129, 0.4);
        }
        
        .score-result {
            margin-top: 18px;
            padding: 18px;
            border-radius: 10px;
            text-align: center;
            font-weight: 700;
            font-size: 1.15em;
        }
        
        .score-result.green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        
        .score-result.amber {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }
        
        .score-result.red {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        
        .no-results {
            text-align: center;
            padding: 80px 20px;
            color: #94a3b8;
        }
        
        .no-results h3 {
            font-size: 1.8em;
            margin-bottom: 12px;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .dashboard { grid-template-columns: repeat(2, 1fr); }
            .filter-grid { grid-template-columns: 1fr; }
            .button-group { grid-template-columns: 1fr; }
            .score-input-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-card">
            <h1>Paper 1 Question Bank</h1>
            <div class="subtitle">IGCSE Geography</div>
            
            <div class="input-group">
                <label for="studentName">Your Name</label>
                <input type="text" id="studentName" placeholder="Enter your full name" required>
            </div>
            
            <div class="input-group">
                <label for="targetGrade">Target Grade</label>
                <select id="targetGrade">
                    <option value="">Select target grade...</option>
                    <option value="9">Grade 9</option>
                    <option value="8">Grade 8</option>
                    <option value="7">Grade 7</option>
                    <option value="6">Grade 6</option>
                    <option value="5">Grade 5</option>
                    <option value="4">Grade 4</option>
                </select>
            </div>
            
            <button class="btn-start" onclick="startApp()">Start Studying 🚀</button>
        </div>
    </div>
    
    <!-- Main App -->
    <div class="app-container" id="appContainer">
        <div class="header">
            <h1>Paper 1 Question Bank</h1>
            <div class="personalized-greeting" id="greeting"></div>
            <div class="target-info" id="targetInfo"></div>
        </div>
        
        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-value blue" id="questionsCompleted">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value blue" id="totalProgress">0%</div>
                <div class="stat-label">Progress</div>
            </div>
            <div class="stat-card">
                <div class="stat-value blue" id="averageScore">-</div>
                <div class="stat-label">Average</div>
            </div>
            <div class="stat-card">
                <div class="stat-value green" id="greenCount">0</div>
                <div class="stat-label">🟢 Green</div>
            </div>
            <div class="stat-card">
                <div class="stat-value amber" id="amberCount">0</div>
                <div class="stat-label">🟠 Amber</div>
            </div>
            <div class="stat-card">
                <div class="stat-value red" id="redCount">0</div>
                <div class="stat-label">🔴 Red</div>
            </div>
        </div>
        
        <div class="controls">
            <div class="filter-grid">
                <div class="filter-group">
                    <label for="searchInput">🔍 Search</label>
                    <input type="text" id="searchInput" placeholder="Search questions...">
                </div>
                <div class="filter-group">
                    <label for="yearFilter">📅 Year</label>
                    <select id="yearFilter">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="paperFilter">📄 Paper</label>
                    <select id="paperFilter">
                        <option value="">All Papers</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="marksFilter">🎯 Marks</label>
                    <select id="marksFilter">
                        <option value="">All Marks</option>
                        <option value="1">1 mark</option>
                        <option value="2">2 marks</option>
                        <option value="3">3 marks</option>
                        <option value="4">4 marks</option>
                        <option value="5+">5+ marks</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="ragFilter">🎨 Status</label>
                    <select id="ragFilter">
                        <option value="">All Questions</option>
                        <option value="unattempted">Not Attempted</option>
                        <option value="green">🟢 Green</option>
                        <option value="amber">🟠 Amber</option>
                        <option value="red">🔴 Red</option>
                    </select>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="randomQuestion()">🎲 Random</button>
                <button class="btn btn-secondary" onclick="resetFilters()">🔄 Reset</button>
                <button class="btn btn-secondary" onclick="toggleAllMarkSchemes()">👁️ Answers</button>
                <button class="btn btn-success" onclick="changeStudent()">👤 Change</button>
            </div>
        </div>
        
        <div class="questions-container" id="questionsContainer">
        </div>
    </div>
    
    <script>

        const questionsData = [{"id": "2019_1R_2_a", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "a", "command_word": "MCQ", "marks": 1, "topic": "Wave processes", "question_summary": "Identify characteristic of constructive waves", "resource": "None", "content_required": "Long wavelength / weak backwash", "mark_scheme": "Correct: A", "ao_mapping": "AO1"}, {"id": "2019_1R_2_b(i)", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "b(i)", "command_word": "MCQ", "marks": 1, "topic": "Coastal landforms", "question_summary": "Identify depositional landform", "resource": "None", "content_required": "", "mark_scheme": "Correct: B (spit)", "ao_mapping": "AO1"}, {"id": "2019_1R_2_b(ii)", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "b(ii)", "command_word": "State", "marks": 1, "topic": "Weathering", "question_summary": "State one type of weathering affecting coasts", "resource": "None", "content_required": "", "mark_scheme": "Biological, Chemical, Physical", "ao_mapping": "AO1"}, {"id": "2019_1R_2_b(iii)", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "b(iii)", "command_word": "Explain", "marks": 2, "topic": "Longshore drift", "question_summary": "Explain the process of longshore drift", "resource": "None", "content_required": "", "mark_scheme": "<strong>Mark Scheme (2 marks):</strong><br>\n<strong>Process explanation:</strong><br>\n• Waves approach beach at an angle (due to prevailing wind direction) (1)<br>\n• Swash carries sediment up the beach at this angle (1)<br>\n• Backwash pulls sediment straight down the beach (due to gravity) (1)<br>\n• This creates a zig-zag movement of material along the coast (1)<br>\n<br>\n<strong>Award 1 mark for:</strong> Basic description of wave movement<br>\n<strong>Award 2 marks for:</strong> Clear explanation including both swash and backwash movement", "ao_mapping": "AO1/AO2"}, {"id": "2019_1R_2_c", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "c", "command_word": "Suggest", "marks": 4, "topic": "Geology & coastline shape", "question_summary": "Suggest two ways geology influences coastline shape", "resource": "Fig 2a – headland/bay diagram", "content_required": "", "mark_scheme": "<strong>Mark Scheme (4 marks):</strong><br>\n<strong>Hard vs Soft rock (award up to 4 marks):</strong><br>\n<br>\n<strong>Hard rock (e.g. granite, limestone):</strong><br>\n• Resists erosion more effectively (1)<br>\n• Erodes slowly, forming headlands that protrude into the sea (1)<br>\n• Creates steep cliffs and rocky coastlines (1)<br>\n<br>\n<strong>Soft rock (e.g. clay, sand):</strong><br>\n• Erodes quickly due to weak structure (1)<br>\n• Forms bays and gently sloping beaches (1)<br>\n• Creates curved indentations in the coastline (1)<br>\n<br>\n<strong>Differential erosion:</strong><br>\n• Different rock types erode at different rates (1)<br>\n• Creates distinctive headland and bay formations (1)<br>\n<br>\n<strong>Award 2 marks for:</strong> Each well-explained way geology influences shape", "ao_mapping": "AO2/AO3"}, {"id": "2019_1R_2_d", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "d", "command_word": "Explain", "marks": 3, "topic": "Coral reef distribution", "question_summary": "Explain one physical factor influencing coral reef distribution", "resource": "None", "content_required": "", "mark_scheme": "<strong>Mark Scheme (3 marks):</strong><br>\n<strong>Physical factors affecting coral distribution:</strong><br>\n<br>\n<strong>Temperature:</strong><br>\n• Requires minimum water temperature of 18°C (1)<br>\n• Optimum temperature 23-29°C for growth (1)<br>\n• Too cold = coral cannot survive (1)<br>\n<br>\n<strong>Light:</strong><br>\n• Needs clear, shallow water for light penetration (1)<br>\n• Photosynthesis by zooxanthellae requires sunlight (1)<br>\n• Maximum depth approximately 60m (1)<br>\n<br>\n<strong>Water quality:</strong><br>\n• Requires clean, sediment-free water (1)<br>\n• Salinity must be stable (30-40 ppt) (1)<br>\n• pH sensitivity - needs slightly alkaline water (1)<br>\n<br>\n<strong>Award 3 marks for:</strong> One factor explained in detail with specific values/mechanisms", "ao_mapping": "AO2"}, {"id": "2019_1R_2_e", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "e", "command_word": "Identify", "marks": 1, "topic": "Coastal landforms", "question_summary": "Identify coastal landform X from photograph", "resource": "Fig 2b – Cliffs of Moher, Ireland photo", "content_required": "Stack", "mark_scheme": "Stack", "ao_mapping": "AO3"}, {"id": "2019_1R_2_f", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "f", "command_word": "Explain", "marks": 4, "topic": "Cliff formation", "question_summary": "Explain how a cliff is formed", "resource": "None", "content_required": "", "mark_scheme": "<strong>Mark Scheme (4 marks):</strong><br>\n<strong>Stage 1 - Wave attack:</strong><br>\n• Destructive waves attack the base of the cliff (1)<br>\n• Hydraulic action and abrasion erode the base (1)<br>\n<br>\n<strong>Stage 2 - Notch formation:</strong><br>\n• A wave-cut notch forms at the base (1)<br>\n• The cliff becomes undercut/unstable (1)<br>\n<br>\n<strong>Stage 3 - Collapse:</strong><br>\n• The overhanging cliff face collapses due to gravity (1)<br>\n• Debris is removed by waves (1)<br>\n<br>\n<strong>Stage 4 - Retreat:</strong><br>\n• Process repeats, causing cliff to retreat inland (1)<br>\n• A wave-cut platform is left at the base (1)<br>\n<br>\n<strong>Award marks for:</strong> Sequential explanation of erosion → notch → collapse → retreat", "ao_mapping": "AO2"}, {"id": "2019_1R_2_g", "paper": "1R", "year": "2019", "section": "Coastal Environments", "q_no": "2", "sub_q": "g", "command_word": "Analyse", "marks": 8, "topic": "Hard engineering", "question_summary": "Analyse reasons for different hard engineering strategies", "resource": "Figs 2c/2d – coastal management diagram + photos (rock armour, groynes, sea wall, breakwater with costs)", "content_required": "", "mark_scheme": "<strong>Mark Scheme (8 marks):</strong><br>\n<strong>Level 3 (7-8 marks): Detailed analysis</strong><br>\n• Identifies multiple strategies with clear reasons for their use<br>\n• Links strategies to specific coastal contexts<br>\n• Explains both advantages and reasons for selection<br>\n• Uses specific examples of locations or case studies<br>\n<br>\n<strong>Level 2 (4-6 marks): Clear explanation</strong><br>\n• Describes different strategies with some reasoning<br>\n• Some link to coastal context<br>\n• Basic advantages mentioned<br>\n<br>\n<strong>Level 1 (1-3 marks): Simple description</strong><br>\n• Lists strategies with limited explanation<br>\n• No clear context<br>\n<br>\n<strong>Indicative content:</strong><br>\n<br>\n<strong>Sea walls:</strong><br>\n• Used in high-value urban/tourist areas (e.g. resorts, harbours) (1)<br>\n• Protects property and infrastructure from wave attack (1)<br>\n• Expensive (£5,000-10,000 per metre) so only used where economic value is high (1)<br>\n• Reflects wave energy, preventing erosion (1)<br>\n<br>\n<strong>Groynes:</strong><br>\n• Used on beaches experiencing longshore drift (1)<br>\n• Trap sediment moving along coast, building up beach (1)<br>\n• Cheaper than sea walls (£5,000-10,000 per groyne) (1)<br>\n• Protects beach tourism/recreation areas (1)<br>\n• BUT can cause downdrift erosion in neighboring areas (1)<br>\n<br>\n<strong>Rock armour (rip-rap):</strong><br>\n• Used where cost is a concern but protection needed (1)<br>\n• Large boulders absorb and dissipate wave energy (1)<br>\n• £1,000-3,000 per metre - more affordable (1)<br>\n• Often used in less developed/rural coastal areas (1)<br>\n<br>\n<strong>Gabions:</strong><br>\n• Used for localized, low-cost protection (1)<br>\n• Wire cages filled with rocks (1)<br>\n• £100-300 per metre - cheapest option (1)<br>\n• Used in low-value areas or as temporary measures (1)<br>\n<br>\n<strong>Reasons for different strategies:</strong><br>\n• Economic value of area being protected (1)<br>\n• Type and rate of erosion occurring (1)<br>\n• Budget available from local/national government (1)<br>\n• Environmental impact considerations (1)<br>\n• Beach type and sediment movement patterns (1)<br>\n<br>\n<strong>Examples required for top marks:</strong><br>\n• Specific named locations (e.g., Mappleton - groynes, Hornsea - sea wall)<br>\n• Cost-benefit comparisons<br>\n• Environmental vs economic priorities", "ao_mapping": "AO3/AO4"}, {"id": "2019_1R_3_a", "paper": "1R", "year": "2019", "section": "Hazardous Environments", "q_no": "3", "sub_q": "a", "command_word": "MCQ", "marks": 1, "topic": "Plate boundaries", "question_summary": "Identify definition of destructive plate margin", "resource": "None", "content_required": "", "mark_scheme": "Correct: D (push together/one destroyed)", "ao_mapping": "AO1"}, {"id": "2019_1R_3_b(i)", "paper": "1R", "year": "2019", "section": "Hazardous Environments", "q_no": "3", "sub_q": "b(i)", "command_word": "MCQ", "marks": 1, "topic": "Volcanic measurement", "question_summary": "Identify how volcanic hazards are measured", "resource": "None", "content_required": "", "mark_scheme": "Correct: C (VEI)", "ao_mapping": "AO1"}, {"id": "2019_1R_3_b(ii)", "paper": "1R", "year": "2019", "section": "Hazardous Environments", "q_no": "3", "sub_q": "b(ii)", "command_word": "State", "marks": 1, "topic": "Hazard impacts", "question_summary": "State one human factor affecting tectonic hazard impact", "resource": "None", "content_required": "", "mark_scheme": "Warning systems, Building quality, Education", "ao_mapping": "AO1"}, {"id": "2019_1R_3_b(iii)", "paper": "1R", "year": "2019", "section": "Hazardous Environments", "q_no": "3", "sub_q": "b(iii)", "command_word": "Explain", "marks": 2 ontent_required": "", "mark_scheme": "<strong>Mark Scheme (8 marks):</strong><br>\n<strong>Level 3 (7-8 marks): Detailed analysis</strong><br>\n• Identifies multiple strategies with clear reasons for their use<br>\n• Links strategies to specific coastal contexts<br>\n• Explains both advantages and reasons for selection<br>\n• Uses specific examples of locations or case studies<br>\n<br>\n<strong>Level 2 (4-6 marks): Clear explanation</strong><br>\n• Describes different strategies with some reasoning<br>\n• Some link to coastal context<br>\n• Basic advantages mentioned<br>\n<br>\n<strong>Level 1 (1-3 marks): Simple description</strong><br>\n• Lists strategies with limited explanation<br>\n• No clear context<br>\n<br>\n<strong>Indicative content:</strong><br>\n<br>\n<strong>Sea walls:</strong><br>\n• Used in high-value urban/tourist areas (e.g. resorts, harbours) (1)<br>\n• Protects property and infrastructure from wave attack (1)<br>\n• Expensive (£5,000-10,000 per metre) so only used where economic value is high (1)<br>\n• Reflects wave energy, preventing erosion (1)<br>\n<br>\n<strong>Groynes:</strong><br>\n• Used on beaches experiencing longshore drift (1)<br>\n• Trap sediment moving along coast, building up beach (1)<br>\n• Cheaper than sea walls (£5,000-10,000 per groyne) (1)<br>\n• Protects beach tourism/recreation areas (1)<br>\n• BUT can cause downdrift erosion in neighboring areas (1)<br>\n<br>\n<strong>Rock armour (rip-rap):</strong><br>\n• Used where cost is a concern but protection needed (1)<br>\n• Large boulders absorb and dissipate wave energy (1)<br>\n• £1,000-3,000 per metre - more affordable (1)<br>\n• Often used in less developed/rural coastal areas (1)<br>\n<br>\n<strong>Gabions:</strong><br>\n• Used for localized, low-cost protection (1)<br>\n• Wire cages filled with rocks (1)<br>\n• £100-300 per metre - cheapest option (1)<br>\n• Used in low-value areas or as temporary measures (1)<br>\n<br>\n<strong>Reasons for different strategies:</strong><br R_3_e", "paper": "1R", "year": "2024", "section": "Hazardous Environments", "q_no": "3", "sub_q": "e", "command_word": "Identify", "marks": 1, "topic": "Volcanic hazards", "question_summary": "Identify the volcanic hazard labelled X", "resource": "Fig 3a: Diagram of volcano erupting massive grey cloud", "content_required": "", "mark_scheme": "Ash (cloud)", "ao_mapping": "AO3"}, {"id": "2024_1R_3_f", "paper": "1R", "year": "2024", "section": "Hazardous Environments", "q_no": "3", "sub_q": "f", "command_word": "Suggest", "marks": 4, "topic": "Cyclone distribution", "question_summary": "Suggest two reasons for the distribution of tropical cyclones", "resource": "Fig 3b: Map showing tracks between 23°N and 23°S, away from equator", "content_required": "", "mark_scheme": "<strong>Mark Scheme (4 marks):</strong><br>27°C+ water fuels evap (1); Coriolis force (1) not at equator", "ao_mapping": "AO2/AO3"}, {"id": "2024_1R_3_g", "paper": "1R", "year": "2024", "section": "Hazardous Environments", "q_no": "3", "sub_q": "g", "command_word": "Analyse", "marks": 8, "topic": "Cyclone impacts", "question_summary": "Analyse the impacts of tropical cyclones on people", "resource": "Fig 3c: Hurricane Irma – 40% businesses closed; 73% power cuts; 25% homes destroyed", "content_required": "", "mark_scheme": "<strong>Mark Scheme (8 marks):</strong><br>L3 (7-8): Evaluate immediate housing trauma vs long-term economic instability (business closures)", "ao_mapping": "AO3/AO4"}];
        
        let studentData = {
            name: '',
            targetGrade: '',
            attempts: {}
        };
        
        let allMarkSchemesVisible = false;
        
        function init() {
            loadStudentData();
            
            if (studentData.name && studentData.targetGrade) {
                showApp();
            } else {
                document.getElementById('welcomeScreen').style.display = 'flex';
            }
        }
        
        function startApp() {
            const name = document.getElementById('studentName').value.trim();
            const grade = document.getElementById('targetGrade').value;
            
            if (!name || !grade) {
                alert('Please enter your name and select a target grade!');
                return;
            }
            
            studentData.name = name;
            studentData.targetGrade = grade;
            saveStudentData();
            showApp();
        }
        
        function showApp() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('appContainer').classList.add('active');
            
            updateGreeting();
            populateFilters();
            renderQuestions();
            updateDashboard();
        }
        
        function updateGreeting() {
            document.getElementById('greeting').textContent = `Welcome back, ${studentData.name}! 👋`;
            document.getElementById('targetInfo').textContent = `Target: Grade ${studentData.targetGrade} • 124 Questions Available`;
        }
        
        function changeStudent() {
            if (confirm('Change student? Your progress will be saved.')) {
                document.getElementById('welcomeScreen').style.display = 'flex';
                document.getElementById('appContainer').classList.remove('active');
                document.getElementById('studentName').value = '';
                document.getElementById('targetGrade').value = '';
            }
        }
        
        function loadStudentData() {
            const saved = localStorage.getItem('coastalStudentData');
            if (saved) {
                studentData = JSON.parse(saved);
            }
        }
        
        function saveStudentData() {
            localStorage.setItem('coastalStudentData', JSON.stringify(studentData));
        }
        
        function populateFilters() {
            const years = [...new Set(questionsData.map(q => q.year))].sort().reverse();
            const papers = [...new Set(questionsData.map(q => q.paper))].sort();
            
            const yearFilter = document.getElementById('yearFilter');
            years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearFilter.appendChild(option);
            });
            
            const paperFilter = document.getElementById('paperFilter');
            papers.forEach(paper => {
                const option = document.createElement('option');
                option.value = paper;
                option.textContent = `Paper ${paper}`;
                paperFilter.appendChild(option);
            });
        }
        
        function filterQuestions() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const year = document.getElementById('yearFilter').value;
            const paper = document.getElementById('paperFilter').value;
            const marks = document.getElementById('marksFilter').value;
            const rag = document.getElementById('ragFilter').value;
            
            return questionsData.filter(q => {
                const matchSearch = !search || 
                    q.question_summary.toLowerCase().includes(search) ||
                    q.mark_scheme.toLowerCase().includes(search);
                
                const matchYear = !year || q.year === year;
                const matchPaper = !paper || q.paper === paper;
                
                let matchMarks = true;
                if (marks) {
                    if (marks === '5+') {
                        matchMarks = q.marks >= 5;
                    } else {
                        matchMarks = q.marks === parseInt(marks);
                    }
                }
                
                let matchRag = true;
                if (rag) {
                    const attempt = studentData.attempts[q.id];
                    if (rag === 'unattempted') {
                        matchRag = !attempt;
                    } else if (attempt) {
                        matchRag = attempt.rag === rag;
                    } else {
                        matchRag = false;
                    }
                }
                
                return matchSearch && matchYear && matchPaper && matchMarks && matchRag;
            });
        }
        
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            const filtered = filterQuestions();
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-results"><h3>No questions found</h3><p>Try adjusting your filters</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map(q => {
                const attempt = studentData.attempts[q.id];
                const fullQNumber = q.sub_q ? `${q.q_no}(${q.sub_q})` : q.q_no;
                
                let cardClass = 'question-card';
                if (attempt) {
                    cardClass += ` completed-${attempt.rag}`;
                }
                
                return `
                    <div class="${cardClass}" id="q-${q.id}">
                        <div class="question-header">
                            <div class="question-meta">
                                <span class="badge badge-year">${q.year}</span>
                                <span class="badge badge-paper">Paper ${q.paper}</span>
                                <span class="badge badge-marks">${q.marks} mark${q.marks > 1 ? 's' : ''}</span>
                                <span class="badge badge-command">${q.command_word}</span>
                                ${q.topic ? `<span class="badge badge-topic">${q.topic}</span>` : ''}
                            </div>
                            <div class="question-number">Q${fullQNumber}</div>
                        </div>
                        
                        <div class="question-text">${q.question_summary}</div>
                        
                        ${q.resource !== 'None' && q.resource ? `
                            <div class="resource-note">📊 Resource: ${q.resource}</div>
                        ` : ''}
                        
                        ${q.content_required ? `
                            <div class="content-required">
                                <h5>🎯 Key Content Required:</h5>
                                ${q.content_required}
                            </div>
                        ` : ''}
                        
                        <button class="mark-scheme-toggle" onclick="toggleMarkScheme('${q.id}')">
                            Show Mark Scheme
                        </button>
                        
                        <div class="mark-scheme" id="ms-${q.id}">
                            <h4>✅ Mark Scheme (${q.marks} mark${q.marks > 1 ? 's' : ''})</h4>
                            <div>${q.mark_scheme}</div>
                        </div>
                        
                        ${attempt ? `
                            <div class="score-result ${attempt.rag}">
                                Your Score: ${attempt.score}/${attempt.maxMarks} (${attempt.percentage}%) - ${
                                    attempt.rag === 'green' ? '🟢 GREEN - Excellent!' :
                                    attempt.rag === 'amber' ? '🟠 AMBER - Review key points' :
                                    '🔴 RED - Retry after reviewing'
                                }
                            </div>
                        ` : `
                            <div class="score-entry">
                                <h4>📝 Record Your Score</h4>
                                <div class="score-input-group">
                                    <div class="score-input-wrapper">
                                        <label>Your Score (out of ${q.marks})</label>
                                        <input type="number" id="score-${q.id}" min="0" max="${q.marks}" placeholder="0">
                                    </div>
                                    <button class="btn-submit-score" onclick="submitScore('${q.id}', ${q.marks})">
                                        Submit
                                    </button>
                                </div>
                            </div>
                        `}
                    </div>
                `;
            }).join('');
        }
        
        function toggleMarkScheme(id) {
            const ms = document.getElementById(`ms-${id}`);
            const btn = ms.previousElementSibling;
            
            if (ms.classList.contains('visible')) {
                ms.classList.remove('visible');
                btn.textContent = 'Show Mark Scheme';
            } else {
                ms.classList.add('visible');
                btn.textContent = 'Hide Mark Scheme';
            }
        }
        
        function toggleAllMarkSchemes() {
            allMarkSchemesVisible = !allMarkSchemesVisible;
            const markSchemes = document.querySelectorAll('.mark-scheme');
            const buttons = document.querySelectorAll('.mark-scheme-toggle');
            
            markSchemes.forEach((ms, idx) => {
                if (allMarkSchemesVisible) {
                    ms.classList.add('visible');
                    buttons[idx].textContent = 'Hide Mark Scheme';
                } else {
                    ms.classList.remove('visible');
                    buttons[idx].textContent = 'Show Mark Scheme';
                }
            });
        }
        
        function submitScore(questionId, maxMarks) {
            const scoreInput = document.getElementById(`score-${questionId}`);
            const score = parseInt(scoreInput.value);
            
            if (isNaN(score) || score < 0 || score > maxMarks) {
                alert(`Please enter a score between 0 and ${maxMarks}`);
                return;
            }
            
            const percentage = Math.round((score / maxMarks) * 100);
            let rag;
            if (percentage >= 80) {
                rag = 'green';
            } else if (percentage >= 50) {
                rag = 'amber';
            } else {
                rag = 'red';
            }
            
            const question = questionsData.find(q => q.id === questionId);
            
            studentData.attempts[questionId] = {
                score,
                maxMarks,
                percentage,
                rag,
                timestamp: new Date().toISOString()
            };
            
            saveStudentData();
            
            sendToGoogleSheets({
                studentName: studentData.name,
                targetGrade: studentData.targetGrade,
                year: question.year,
                paper: question.paper,
                question: `Q${question.q_no}${question.sub_q ? '(' + question.sub_q + ')' : ''}`,
                maxMarks,
                score,
                percentage,
                rag: rag.toUpperCase()
            });
            
            renderQuestions();
            updateDashboard();
        }
        
        function sendToGoogleSheets(data) {
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            }).catch(err => console.log('Data sent'));
        }
        
        function updateDashboard() {
            const attempts = Object.values(studentData.attempts);
            const completed = attempts.length;
            const progress = Math.round((completed / questionsData.length) * 100);
            
            let greenCount = 0;
            let amberCount = 0;
            let redCount = 0;
            let totalPercentage = 0;
            
            attempts.forEach(att => {
                if (att.rag === 'green') greenCount++;
                else if (att.rag === 'amber') amberCount++;
                else if (att.rag === 'red') redCount++;
                totalPercentage += att.percentage;
            });
            
            const avgScore = completed > 0 ? Math.round(totalPercentage / completed) + '%' : '-';
            
            document.getElementById('questionsCompleted').textContent = completed;
            document.getElementById('totalProgress').textContent = progress + '%';
            document.getElementById('averageScore').textContent = avgScore;
            document.getElementById('greenCount').textContent = greenCount;
            document.getElementById('amberCount').textContent = amberCount;
            document.getElementById('redCount').textContent = redCount;
        }
        
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('yearFilter').value = '';
            document.getElementById('paperFilter').value = '';
            document.getElementById('marksFilter').value = '';
            document.getElementById('ragFilter').value = '';
            renderQuestions();
        }
        
        function randomQuestion() {
            const unattempted = questionsData.filter(q => !studentData.attempts[q.id]);
            const pool = unattempted.length > 0 ? unattempted : questionsData;
            const random = pool[Math.floor(Math.random() * pool.length)];
            
            resetFilters();
            document.getElementById('yearFilter').value = random.year;
            document.getElementById('paperFilter').value = random.paper;
            renderQuestions();
            
            setTimeout(() => {
                const card = document.getElementById(`q-${random.id}`);
                if (card) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
        }
        
        document.getElementById('searchInput').addEventListener('input', renderQuestions);
        document.getElementById('yearFilter').addEventListener('change', renderQuestions);
        document.getElementById('paperFilter').addEventListener('change', renderQuestions);
        document.getElementById('marksFilter').addEventListener('change', renderQuestions);
        document.getElementById('ragFilter').addEventListener('change', renderQuestions);
        
        init();
    </script>
</body>
</html>
